<!doctype html>
<html lang="en" data-theme="archers">
	<head>
		<meta charset="utf-8" />
		<title>ARCHive Network</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Resolve light/dark before first paint so the theme never flashes. An
		     explicit saved choice wins; otherwise follow the OS. Mirrors the logic
		     in src/lib/theme.svelte.js — keep the storage key in sync. -->
		<script>
			(function () {
				try {
					var saved = localStorage.getItem('archive-theme');
					var mode =
						saved === 'dark' || saved === 'light'
							? saved
							: window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					var root = document.documentElement;
					if (mode === 'dark') root.classList.add('dark');
					root.style.colorScheme = mode;
				} catch (e) {}
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
